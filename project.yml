name: SFMaker
options:
  bundleIdPrefix: com.sfmaker
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  SFMaker:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: SFMaker
    info:
      path: SFMaker/Info.plist
      properties:
        CFBundleDisplayName: SF Image Maker
        CFBundleName: SF Image Maker
        CFBundleIdentifier: com.sfmaker.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
        NSDocumentsFolderUsageDescription: SF Image Maker needs access to save exported images.
        LSMinimumSystemVersion: "13.0"
    entitlements:
      path: SFMaker/SFMaker.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_NAME: SFMaker
        PRODUCT_BUNDLE_IDENTIFIER: com.sfmaker.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: SFMaker/Info.plist
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
